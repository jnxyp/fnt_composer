defaults:
  atlas_width: 512
  atlas_height: 512
  padding: 1
  on_missing: skip
  clean_output: true
  starsector_xadvance_compat: true
  overrides:
    "{": { xadvance: 0, width: 0, height: 0 }
    "}": { xadvance: 0, width: 0, height: 0 }

outputs:
  - name: insignia15LTaa
    dir: lantinghei
    face: "insignia15LTaa+方正兰亭中粗黑15"
    atlas_width: -1
    atlas_height: -1
    sources:
      - type: fnt
        path: source/insignia15LTaa.fnt
      - type: ttf
        path: "source/方正兰亭中粗黑.ttf"
        size: 15
        color: [255, 255, 255]
        yoffset_adjust: -1
        supersample: 8
        hinting: light
    chars:
      - { file: charset/chars.txt }

  - name: insignia21LTaa
    dir: lantinghei
    face: "insignia21LTaa+方正兰亭中粗黑21"
    atlas_width: -1
    atlas_height: -1
    sources:
      - type: fnt
        path: source/insignia21LTaa.fnt
      - type: ttf
        path: "source/方正兰亭中粗黑.ttf"
        size: 21
        color: [255, 255, 255]
        yoffset_adjust: -1
        supersample: 4
        hinting: light
    chars:
      - { file: charset/chars.txt }

